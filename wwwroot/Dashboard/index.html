<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<link rel="preconnect" href="https://basemaps.cartocdn.com" crossorigin>
<link rel="preconnect" href="https://router.project-osrm.org" crossorigin>
<link rel="preconnect" href="https://wolfstruckingco.nbth.workers.dev" crossorigin>
<meta name="description" content="Driver dashboard for Wolfs Trucking Co. — accept jobs, navigate with voice, log timesheets.">
<meta property="og:title" content="Driver Dashboard | Wolfs Trucking Co.">
<meta property="og:description" content="Driver dashboard for Wolfs Trucking Co. — accept jobs, navigate with voice, log timesheets.">
<meta property="og:type" content="website">
<meta property="og:image" content="/wolfstruckingco.com/icon.svg">
<meta name="twitter:card" content="summary">
<title>Driver Dashboard | Wolfs Trucking Co.</title>
<link rel="icon" type="image/svg+xml" href="/wolfstruckingco.com/icon.svg">
<link rel="apple-touch-icon" href="/wolfstruckingco.com/icon.svg">
<link rel="manifest" href="/wolfstruckingco.com/manifest.json">
<meta name="theme-color" content="#ff6b35">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css">
<link rel="stylesheet" href="/wolfstruckingco.com/Dashboard/dashboard.css">
</head>
<body>
<div class="App">
  <div id="Map"></div>

  <div class="TopBar TopBarOverlay">
    <div class="TopBarLeft">
      <button class="BtnBurger" onclick="ToggleMenu()" aria-label="Open menu">&#9776;</button>
      <button class="PanelReopen" id="ReopenLeft" onclick="ToggleLeftPanel()" aria-label="Show jobs panel">&#128203; Available Jobs</button>
    </div>
  </div>

  <div class="MenuOverlay" id="MenuOverlay" onclick="ToggleMenu()"></div>
  <div class="SideMenu" id="SideMenu">
    <div class="MenuHeader">
      <h2>Wolfs Trucking</h2>
      <button class="MenuClose" onclick="ToggleMenu()" aria-label="Close menu">&#10005;</button>
    </div>
    <div class="MenuItems">
      <button class="MenuItem Active" onclick="ShowView('jobs');ToggleMenu()"><span class="MenuIcon">&#128203;</span> Available Jobs</button>
      <button class="MenuItem" onclick="ShowView('active');ToggleMenu()"><span class="MenuIcon">&#128666;</span> Active Delivery</button>
      <button class="MenuItem" onclick="ShowView('hall');ToggleMenu()"><span class="MenuIcon">&#128197;</span> My Hiring Hall</button>
      <button class="MenuItem" onclick="ShowView('kpis');ToggleMenu()"><span class="MenuIcon">&#128200;</span> My KPIs</button>
      <button class="MenuItem" onclick="OpenChat();ToggleMenu()"><span class="MenuIcon">&#128172;</span> Dispatch Chat</button>
      <a class="MenuItem" href="/wolfstruckingco.com/CareerAgent/"><span class="MenuIcon">&#129302;</span> Career Agent</a>
      <a class="MenuItem" href="/wolfstruckingco.com/HiringHall/"><span class="MenuIcon">&#127970;</span> Hiring Hall (Admin)</a>
      <a class="MenuItem" href="/wolfstruckingco.com/Settings/"><span class="MenuIcon">&#9881;</span> Settings</a>
    </div>
    <div class="MenuFooter TopActions">
      <div class="MenuUser" id="MenuUser">
        <div class="MenuUserName" id="MenuUserName">—</div>
        <div class="MenuUserEmail" id="MenuUserEmail">—</div>
      </div>
      <!-- auth-header.js injects the Sign Out anchor into .TopActions, so we just leave a slot
           here. theme.js also finds .TopActions and drops the dark/light/auto chip in. -->
    </div>
  </div>

  <div class="LeftPanel" id="LeftPanel">
    <div id="JobsView">
      <div class="PanelHeader">
        <span class="PanelTitle">Available Jobs</span>
        <span class="PanelBadge" id="JobCount">0 Available</span>
        <button class="PanelClose" onclick="ToggleLeftPanel()" aria-label="Hide panel" title="Hide">&#10005;</button>
      </div>
      <div class="PanelContent" id="JobList"></div>
      <div class="PanelContent" id="RealJobList" style="border-top:1px solid var(--border);padding-top:12px;margin-top:10px;font-size:.9rem"></div>
    </div>
    <div id="KpisView" style="display:none">
      <div class="PanelHeader">
        <span class="PanelTitle">My Performance</span>
      </div>
      <div class="PanelContent" id="KpiContent"></div>
    </div>
    <div id="HallView" style="display:none">
      <div class="PanelHeader">
        <span class="PanelTitle">My Hiring Hall schedules</span>
        <span class="PanelBadge" id="HallBadge">—</span>
      </div>
      <div class="PanelContent" id="HallContent" style="font-size:.88rem;line-height:1.5">Loading…</div>
    </div>
  </div>
  <button class="PanelToggle PanelToggleLeft" id="ToggleLeft" onclick="ToggleLeftPanel()" aria-label="Toggle panel">&#9664;</button>

  <div class="RightPanel Collapsed" id="RightPanel">
    <div class="ActiveDelivery" id="ActiveView">
      <div class="PanelHeader">
        <span class="PanelTitle" id="ActiveTitle">Active Delivery</span>
        <span class="PanelBadge" style="background:var(--success)">In Progress</span>
      </div>
      <div class="PanelContent">
        <div id="PreTrip">
          <h4 style="margin-bottom:12px;font-size:.9rem;color:var(--text-muted)">PRE-TRIP CHECKLIST</h4>
          <div id="ChecklistItems"></div>
          <button class="BtnAccept" id="BtnStartDrive" onclick="StartDriving()" disabled>Start Driving</button>
        </div>
        <div id="DrivingView" style="display:none">
          <div class="DeliverySteps" id="DeliverySteps"></div>
          <button class="BtnComplete" id="BtnCompleteDelivery" onclick="CompleteDelivery()">Complete Delivery</button>
        </div>
      </div>
    </div>
  </div>
  <button class="PanelToggle PanelToggleRight Collapsed" id="ToggleRight" onclick="ToggleRightPanel()" aria-label="Toggle panel">&#9654;</button>

  <button class="BtnChat" id="BtnChat" onclick="OpenChat()" aria-label="Open chat">&#128172;<span class="ChatBadge" id="ChatBadge">0</span></button>

  <div class="ChatPanel" id="ChatPanel">
    <div class="ChatHeader">
      <h3>Dispatch Chat</h3>
      <button class="ChatClose" onclick="CloseChat()" aria-label="Close chat">&#10005;</button>
    </div>
    <select class="AuditSelect" id="AuditSelect" onchange="LoadAuditTrail(this.value)">
      <option value="current">Current Conversation</option>
      <option value="2026-04-14">Apr 14 - Load #4821</option>
      <option value="2026-04-13">Apr 13 - Load #4807</option>
      <option value="2026-04-12">Apr 12 - Load #4793</option>
    </select>
    <div class="ChatMessages" id="ChatMessages">
      <div class="ChatMsg ChatMsgBot">Dispatch AI ready. How can I help you today?</div>
    </div>
    <div class="ChatInput">
      <button class="ChatVoice" id="ChatVoiceBtn" onclick="ToggleChatVoice()" aria-label="Voice input">&#127908;</button>
      <input type="text" id="ChatInputField" placeholder="Message dispatch..." onkeydown="if(event.key==='Enter')SendChat()">
      <button class="ChatSend" onclick="SendChat()" aria-label="Send message">&#10148;</button>
    </div>
  </div>

  <div class="Onboarding" id="Onboarding">
    <div class="OnboardStep" id="OnboardContent"></div>
  </div>
  <div class="Highlight" id="Highlight" style="display:none"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/wolfstruckingco.com/wolfs-map.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
<script src="/wolfstruckingco.com/demo.js"></script>
<script src="/wolfstruckingco.com/Dashboard/dashboard-state.js"></script>
<script src="/wolfstruckingco.com/Dashboard/dashboard-route-ui.js"></script>
<script src="/wolfstruckingco.com/Dashboard/dashboard-main.js"></script>
<script>window.__allowedRoles = ['admin','driver'];</script>
<script src="/wolfstruckingco.com/auth-guard.js"></script>
<script src="/wolfstruckingco.com/auth-header.js"></script>
<script src="/wolfstruckingco.com/db.js"></script>
<script src="/wolfstruckingco.com/driver-tracker.js"></script>
<script src="/wolfstruckingco.com/nav-voice.js"></script>
<script src="/wolfstruckingco.com/Dashboard/dashboard-jobs-routing.js"></script>
<script src="/wolfstruckingco.com/Dashboard/dashboard-extras.js"></script>
</body>
</html>
