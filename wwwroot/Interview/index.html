<script>
  // Mint a demo applicant session if none exists, so the target page has an identity to work with.
  try {
    if (!localStorage.getItem('wolfs_session')) {
      localStorage.setItem('wolfs_session', 'demo_interview_' + Date.now());
      localStorage.setItem('wolfs_email', 'interview-visitor@wolfstruckingco.com');
      localStorage.setItem('wolfs_role', 'applicant');
      if (!localStorage.getItem('wolfs_name')) localStorage.setItem('wolfs_name', 'Applicant');
    }
  } catch (_) {}
  window.location.replace('/wolfstruckingco.com/Applicant/');
</script>
