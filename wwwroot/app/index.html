<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="preconnect" href="https://basemaps.cartocdn.com" crossorigin>
<link rel="preconnect" href="https://router.project-osrm.org" crossorigin>
<link rel="preconnect" href="https://wolfstruckingco.nbth.workers.dev" crossorigin>
    <title>Wolfs Trucking Co</title>
    <base href="/wolfstruckingco.com/app/" />
    <link rel="stylesheet" href="_content/WolfsTruckingCo.SharedUI/css/app.css" />
    <!-- Shared dispatcher-chat styles (reused by the Blazor component). -->
    <style>
      :root{--bg:#0f1419;--card:#1a2332;--border:#2a3a4a;--text:#e8e8e8;--text-muted:#8899aa;--accent:#ff6b35;--accent-hover:#ff8c5a;--success:#22c55e;--info:#3b82f6}
      body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);margin:0;min-height:100vh}
      .Stage{max-width:900px;margin:0 auto;padding:28px 20px 60px}
      .Stage h1{font-size:1.5rem;font-weight:800;margin-bottom:6px}
      .Stage>p{color:var(--text-muted);line-height:1.55;margin-bottom:20px}
      .WChat{display:flex;flex-direction:column;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;width:100%}
      .WChat .WChatLog{flex:1;min-height:240px;max-height:60vh;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:4px}
      .WChat .WMsg{max-width:90%;padding:10px 14px;border-radius:10px;line-height:1.45;font-size:.92rem;word-wrap:break-word;white-space:pre-wrap}
      .WChat .WMsg.User{align-self:flex-end;background:var(--accent);color:#fff}
      .WChat .WMsg.Agent{align-self:flex-start;background:rgba(255,107,53,.08);border:1px solid rgba(255,107,53,.3);color:var(--text)}
      .WChat .WMsg .WLabel{display:block;font-size:.7rem;font-weight:700;opacity:.7;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
      .WChat .WForm{display:flex;gap:8px;align-items:stretch}
      .WChat .WForm input{flex:1;padding:11px 14px;border-radius:10px;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:.95rem}
      .WChat .WForm input:focus{border-color:var(--accent);outline:none}
      .WChat .WForm button{padding:11px 16px;border-radius:10px;font-weight:700;cursor:pointer;font-family:inherit;font-size:.88rem;border:1px solid transparent}
      .WChat .WForm .WCall{background:rgba(255,107,53,.1);border-color:var(--accent);color:var(--accent)}
      .WChat .WForm .WCall.Listening{background:#ef4444;border-color:#ef4444;color:#fff}
      .WChat .WForm .WCall.Processing{background:#9ca3af;border-color:#9ca3af;color:#fff}
      .WChat .WForm .WSend{background:var(--accent);color:#fff;border-color:var(--accent)}
      .WChat .WStatus{font-size:.74rem;color:var(--text-muted);min-height:1em}
      .WChat .WInlineUpload{display:flex;gap:8px;align-items:center;margin-top:8px;padding:8px 10px;background:rgba(255,107,53,.08);border:1px dashed var(--accent);border-radius:8px;font-size:.78rem;flex-wrap:wrap}
      .WChat .WInlineUpload>span{flex:1;min-width:160px;color:var(--accent);font-weight:600}
      .WChat .WInlineUpload label{padding:6px 12px;border-radius:6px;background:var(--accent);color:#fff;font-weight:700;cursor:pointer}
      .WChat .Scope{font-size:.76rem;color:var(--text-muted);padding:6px 10px;background:rgba(255,255,255,.03);border-radius:6px}
      .WChat .Spinner{display:inline-block;width:12px;height:12px;border-radius:50%;border:2px solid rgba(255,107,53,.25);border-top-color:var(--accent);animation:WSpin .7s linear infinite;margin-right:6px;vertical-align:middle}
      @keyframes WSpin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>
    <div id="app">Loading…</div>
    <script src="voice-bridge.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
