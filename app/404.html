<!doctype html><html><head><meta charset="utf-8" /><title>Redirecting</title><script>var L=location;L.replace(L.protocol+'//'+L.hostname+(L.port?':'+L.port:'')+L.pathname.split('/').slice(0,2).join('/')+'/?p=/'+L.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g,'~and~')+(L.search?'&q='+L.search.slice(1).replace(/&/g,'~and~'):'')+L.hash);</script></head><body></body></html>
