<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Wolfs Trucking - Dashboard</title>
<script>if(localStorage.getItem('wolfs_authenticated')!=='true'){location.replace('../')}</script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1419;--card:#1a2332;--accent:#ff6b35;--text:#e8e8e8;--dim:#8899aa;--nav:#0a0f14;--green:#22c55e;--blue:#3b82f6;--red:#ef4444;--purple:#a855f7;--gray:#6b7280;--border:#2a3a4a;--panel-bg:rgba(26,35,50,0.95);--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);--safe-left:env(safe-area-inset-left,0px);--safe-right:env(safe-area-inset-right,0px)}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:14px}
button,a,.menu-step,.menu-link,.menu-logout,.tab,.tl-item,.checklist label,input{touch-action:manipulation}
#map{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:1;transition:width .3s,height .3s}
.leaflet-control-attribution{display:none!important}
.leaflet-control-zoom{display:none!important}
.leaflet-routing-container{display:none!important}

@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,107,53,.6)}50%{box-shadow:0 0 0 14px rgba(255,107,53,0)}}
.marker-current{animation:pulse 2s infinite}

.burger-btn{position:fixed;top:calc(14px + var(--safe-top));left:calc(14px + var(--safe-left));z-index:900;width:44px;height:44px;border-radius:50%;background:var(--panel-bg);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);font-size:1.2rem;transition:background .2s}
.burger-btn:hover{background:rgba(26,35,50,1)}

.top-right-hud{position:fixed;top:calc(14px + var(--safe-top));right:calc(14px + var(--safe-right));z-index:900;display:flex;align-items:center;gap:8px}
.step-badge{background:var(--accent);color:#fff;padding:4px 10px;border-radius:10px;font-size:.78rem;font-weight:700;min-width:44px;text-align:center;min-height:32px;display:flex;align-items:center;justify-content:center}
.clock-badge{background:var(--panel-bg);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.06);color:var(--text);padding:4px 10px;border-radius:10px;font-size:.78rem;font-weight:600;min-height:32px;display:flex;align-items:center;justify-content:center}

.menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1999;opacity:0;visibility:hidden;transition:opacity .3s,visibility .3s}
.menu-overlay.open{opacity:1;visibility:visible}
.menu{position:fixed;top:0;left:0;width:300px;height:100%;background:var(--nav);z-index:2000;transform:translateX(-100%);visibility:hidden;transition:transform .3s,visibility .3s;overflow-y:auto;display:flex;flex-direction:column;padding-top:var(--safe-top);padding-bottom:var(--safe-bottom);padding-left:var(--safe-left)}
.menu.open{transform:translateX(0);visibility:visible}
.menu-header{padding:20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.avatar{width:44px;height:44px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1rem;flex-shrink:0}
.menu-header-info{font-size:.85rem;line-height:1.4}
.menu-header-info span{display:block;color:var(--dim);font-size:.75rem}
.menu-steps{flex:1;overflow-y:auto;padding:8px 0}
.menu-step{display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer;transition:background .15s;font-size:.8rem;min-height:44px}
.menu-step:hover{background:rgba(255,255,255,.05)}
.menu-step.active{background:rgba(255,107,53,.1);border-left:3px solid var(--accent)}
.menu-step.completed{opacity:.55}
.step-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;flex-shrink:0;color:#fff}
.step-num.inspection{background:var(--red)}
.step-num.drive{background:var(--blue)}
.step-num.load{background:var(--accent)}
.step-num.unload{background:var(--accent)}
.step-num.fuel{background:var(--purple)}
.step-num.break{background:var(--gray)}
.step-num.complete{background:var(--green)}
.menu-step-info{flex:1;min-width:0}
.menu-step-name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.menu-step-time{color:var(--dim);font-size:.7rem}
.menu-step-icon{font-size:.85rem;flex-shrink:0}
.menu-divider{height:1px;background:var(--border);margin:8px 16px}
.menu-link{display:flex;align-items:center;gap:10px;padding:12px 16px;color:var(--text);text-decoration:none;font-size:.85rem;transition:background .15s;cursor:pointer;min-height:44px}
.menu-link:hover{background:rgba(255,255,255,.05)}
.menu-link svg{width:20px;height:20px;opacity:.7}
.menu-logout{color:var(--red);margin:8px 16px 16px;padding:12px;border-radius:8px;border:1px solid rgba(239,68,68,.3);background:rgba(239,68,68,.08);text-align:center;cursor:pointer;font-weight:600;font-size:.85rem;transition:background .15s;min-height:44px;display:flex;align-items:center;justify-content:center}
.menu-logout:hover{background:rgba(239,68,68,.15)}

.details-panel{position:fixed;z-index:800;background:var(--panel-bg);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;transition:all .3s ease;overflow:hidden}
.details-panel.dock-bottom{bottom:0;left:0;right:0;height:35vh;border-radius:12px 12px 0 0}
.details-panel.dock-right{top:0;right:0;bottom:0;width:380px;border-radius:12px 0 0 12px}
.details-panel.dock-top{top:0;left:0;right:0;height:35vh;border-radius:0 0 12px 12px}
.details-panel.dock-left{top:0;left:0;bottom:0;width:380px;border-radius:0 12px 12px 0}
.details-panel.size-compact.dock-bottom,.details-panel.size-compact.dock-top{height:25vh}
.details-panel.size-expanded.dock-bottom,.details-panel.size-expanded.dock-top{height:50vh}
.details-panel.size-compact.dock-right,.details-panel.size-compact.dock-left{width:280px}
.details-panel.size-expanded.dock-right,.details-panel.size-expanded.dock-left{width:480px}
.details-panel.hidden{opacity:0;pointer-events:none}
.details-panel.dock-bottom.hidden{transform:translateY(100%)}
.details-panel.dock-top.hidden{transform:translateY(-100%)}
.details-panel.dock-right.hidden{transform:translateX(100%)}
.details-panel.dock-left.hidden{transform:translateX(-100%)}

.panel-header{display:flex;align-items:center;justify-content:flex-end;gap:4px;padding:6px 8px;flex-shrink:0;min-height:44px}
.panel-dock-btn{width:44px;height:44px;border-radius:8px;border:none;background:rgba(255,255,255,.06);color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:background .15s;flex-shrink:0}
.panel-dock-btn:hover{background:rgba(255,255,255,.12);color:var(--text)}
.panel-dock-btn svg{width:20px;height:20px;pointer-events:none}

.panel-summary{padding:0 12px 6px;font-size:.82rem;display:flex;align-items:center;gap:10px;flex-shrink:0}
.panel-summary .step-num{width:28px;height:28px;font-size:.72rem}
.panel-summary-text{flex:1}
.panel-summary-text strong{display:block;font-size:.88rem}
.panel-summary-text span{color:var(--dim);font-size:.75rem}

.tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;padding:0 8px}
.tab{flex:1;padding:9px 4px;text-align:center;font-size:.72rem;font-weight:600;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;min-height:44px;display:flex;align-items:center;justify-content:center}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

.tab-content{flex:1;overflow-y:auto;padding:10px 12px;-webkit-overflow-scrolling:touch}
.detail-card{padding:10px;background:rgba(255,255,255,.02);border-radius:8px;margin-bottom:8px}
.detail-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.detail-badge{padding:2px 8px;border-radius:6px;font-size:.68rem;font-weight:700;color:#fff}
.detail-title{font-size:.92rem;font-weight:700}
.detail-meta{display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:.78rem}
.detail-meta dt{color:var(--dim)}
.detail-meta dd{font-weight:600}
.detail-instructions{margin-top:6px;padding:6px;background:rgba(255,255,255,.03);border-radius:6px;font-size:.78rem;color:var(--dim);line-height:1.4}
.btn-complete{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:.9rem;font-weight:700;cursor:pointer;margin-top:8px;transition:background .15s;min-height:44px}
.btn-complete:hover:not(:disabled){background:#e55a2b}
.btn-complete:disabled{background:var(--gray);cursor:default;opacity:.6}
.btn-map{width:100%;padding:10px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer;margin-top:6px;min-height:44px}
.checklist{margin-top:6px}
.checklist label{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:.8rem;cursor:pointer;min-height:44px}
.checklist input{accent-color:var(--accent);width:18px;height:18px}

.timeline{position:relative;padding-left:24px}
.timeline::before{content:'';position:absolute;left:10px;top:0;bottom:0;width:2px;background:var(--border)}
.tl-item{position:relative;padding:6px 0;cursor:pointer}
.tl-item:hover .tl-name{color:var(--accent)}
.tl-dot{position:absolute;left:-18px;top:10px;width:10px;height:10px;border-radius:50%;border:2px solid var(--border);background:var(--nav)}
.tl-item.done .tl-dot{background:var(--green);border-color:var(--green)}
.tl-item.current .tl-dot{background:var(--accent);border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,107,53,.25)}
.tl-time{font-size:.7rem;color:var(--dim)}
.tl-name{font-size:.78rem;font-weight:600}
.tl-detail{font-size:.7rem;color:var(--dim)}
.tl-status{display:inline-block;padding:1px 5px;border-radius:4px;font-size:.62rem;font-weight:600;margin-left:4px}
.tl-status.done{background:rgba(34,197,94,.15);color:var(--green)}
.tl-status.active{background:rgba(255,107,53,.15);color:var(--accent)}
.tl-status.pending{background:rgba(107,114,128,.15);color:var(--gray)}
.tl-summary{margin-top:10px;padding:8px;background:rgba(255,255,255,.02);border-radius:6px;font-size:.78rem;display:grid;grid-template-columns:1fr 1fr;gap:4px}
.tl-summary dt{color:var(--dim)}
.tl-summary dd{font-weight:600;text-align:right}

.earn-hero{text-align:center;padding:14px;background:rgba(255,255,255,.02);border-radius:10px;margin-bottom:10px}
.earn-hero .amount{font-size:2rem;font-weight:800;color:var(--accent)}
.earn-hero .label{color:var(--dim);font-size:.78rem}
.earn-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.earn-box{background:rgba(255,255,255,.02);border-radius:6px;padding:8px;text-align:center}
.earn-box .val{font-size:1rem;font-weight:700}
.earn-box .lbl{font-size:.68rem;color:var(--dim)}
.earn-table{width:100%;border-collapse:collapse;font-size:.78rem;margin-bottom:10px}
.earn-table td{padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.earn-table td:last-child{text-align:right;font-weight:600}
.earn-table tr:last-child td{border:none;font-weight:700;color:var(--accent)}
.earn-payout{padding:8px;background:rgba(255,255,255,.02);border-radius:6px;font-size:.78rem;color:var(--dim);line-height:1.5}

.kpi-section{margin-bottom:12px}
.kpi-section h3{font-size:.8rem;font-weight:700;margin-bottom:6px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.kpi{background:rgba(255,255,255,.02);border-radius:6px;padding:8px}
.kpi-val{font-size:1rem;font-weight:700}
.kpi-lbl{font-size:.68rem;color:var(--dim);margin-top:2px}
.kpi.green .kpi-val{color:var(--green)}
.kpi.blue .kpi-val{color:var(--blue)}
.kpi.accent .kpi-val{color:var(--accent)}

.completion-card{text-align:center;padding:24px 12px;background:rgba(255,255,255,.02);border-radius:10px;margin-bottom:8px}
.completion-card h2{font-size:1.3rem;color:var(--green);margin-bottom:6px}
.completion-card .icon{font-size:2.5rem;margin-bottom:10px}
.completion-card .stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:12px;text-align:left}
.completion-card .stat{padding:6px;background:rgba(255,255,255,.03);border-radius:6px}
.completion-card .stat dt{font-size:.7rem;color:var(--dim)}
.completion-card .stat dd{font-size:.88rem;font-weight:700}

.show-panel-btn{position:fixed;z-index:810;width:44px;height:44px;border-radius:50%;background:var(--panel-bg);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.06);display:none;align-items:center;justify-content:center;cursor:pointer;color:var(--accent);font-size:1.1rem;font-weight:700;font-style:italic;transition:all .2s;bottom:calc(14px + var(--safe-bottom));left:calc(14px + var(--safe-left))}
.show-panel-btn:hover{background:rgba(26,35,50,1);transform:scale(1.08)}

.chat-btn{position:fixed;bottom:calc(14px + var(--safe-bottom));right:calc(14px + var(--safe-right));z-index:850;width:50px;height:50px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;box-shadow:0 4px 16px rgba(255,107,53,.3)}
.chat-btn:hover{transform:scale(1.08)}

.chat-panel{position:fixed;top:0;right:0;bottom:0;width:340px;max-width:100vw;background:var(--panel-bg);backdrop-filter:blur(12px);border-left:1px solid rgba(255,255,255,.06);z-index:1500;display:flex;flex-direction:column;transform:translateX(100%);visibility:hidden;transition:transform .3s,visibility .3s;padding-top:var(--safe-top);padding-bottom:var(--safe-bottom);padding-right:var(--safe-right)}
.chat-panel.open{transform:translateX(0);visibility:visible}
.chat-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;min-height:50px}
.chat-header-title{flex:1;font-size:.88rem;font-weight:700}
.chat-status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px}
.chat-status-dot.connected{background:var(--green)}
.chat-status-dot.disconnected{background:var(--red)}
.chat-header-status{font-size:.7rem;margin-left:8px;display:flex;align-items:center}
.chat-close{background:none;border:none;color:var(--dim);font-size:1.2rem;cursor:pointer;padding:6px;border-radius:6px;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center}
.chat-close:hover{color:var(--text);background:rgba(255,255,255,.06)}
.chat-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.chat-msg{max-width:85%;padding:8px 12px;border-radius:10px;font-size:.82rem;line-height:1.4;word-break:break-word}
.chat-msg.system{align-self:center;background:rgba(255,255,255,.04);color:var(--dim);font-size:.72rem;border-radius:6px;max-width:100%;text-align:center}
.chat-msg.assistant{align-self:flex-start;background:rgba(59,130,246,.15);color:var(--text);border-bottom-left-radius:2px}
.chat-msg.user{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:2px}
.chat-input-bar{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
.chat-input{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:10px 12px;color:var(--text);font-size:.82rem;outline:none;min-height:44px}
.chat-input:focus{border-color:var(--accent)}
.chat-input::placeholder{color:var(--dim)}
.chat-send{width:44px;height:44px;border-radius:8px;background:var(--accent);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:background .15s;flex-shrink:0}
.chat-send:hover{background:#e55a2b}

@media(max-width:768px){
.details-panel.dock-right,.details-panel.dock-left,.details-panel.dock-bottom,.details-panel.dock-top{width:100vw!important;border-radius:0}
.details-panel.size-compact.dock-right,.details-panel.size-compact.dock-left{width:100vw!important}
.details-panel.size-expanded.dock-right,.details-panel.size-expanded.dock-left{width:100vw!important}
.details-panel.dock-right,.details-panel.dock-left{height:50vh!important}
.chat-panel{width:100vw;left:0;right:0;border-left:none}
.menu{width:100vw}
.menu-overlay.open{background:rgba(0,0,0,.7)}
.burger-btn{top:calc(10px + var(--safe-top));left:calc(10px + var(--safe-left))}
.top-right-hud{top:calc(10px + var(--safe-top));right:calc(10px + var(--safe-right))}
}
@media(min-width:769px){
.menu{width:320px}
}
</style>
</head>
<body>
<div id="map"></div>

<button class="burger-btn" onclick="toggleMenu()" aria-label="Menu">&#9776;</button>

<div class="top-right-hud">
<span class="step-badge" id="stepBadge">1/22</span>
</div>

<div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>
<nav class="menu" id="menu">
<div class="menu-header">
<div class="avatar">JM</div>
<div class="menu-header-info">Jake Martinez<span>CDL-A &bull; Unit WTC-0847</span></div>
</div>
<div class="menu-steps" id="menuSteps"></div>
<div class="menu-divider"></div>
<div class="menu-link" onclick="ToggleChat();toggleMenu()">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
Dispatch
</div>
<div class="menu-link" onclick="ShowTab(2);toggleMenu();ShowPanel()">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
Earnings
</div>
<div class="menu-link" onclick="ShowTab(3);toggleMenu();ShowPanel()">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
KPIs
</div>
<a class="menu-link" href="../Hiring/">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
Hiring
</a>
<a class="menu-link" href="../Investors/">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/><line x1="3" y1="22" x2="21" y2="22"/></svg>
Investors
</a>
<a class="menu-link" href="../Settings/">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
Settings
</a>
<div class="menu-divider"></div>
<div class="menu-logout" onclick="doLogout()">Logout</div>
</nav>

<div class="details-panel dock-bottom" id="detailsPanel">
<div class="panel-header">
<button class="panel-dock-btn" onclick="CycleDock()" title="Dock position" id="dockBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19V5M5 12H3M21 12h-2M12 19l-3-3M12 19l3-3M12 5L9 8M12 5l3 3"/></svg></button>
<button class="panel-dock-btn" onclick="HidePanel()" title="Close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>

function DrawTrafficRoute(Coords){
TrafficLayers.forEach(function(L){Map.removeLayer(L)});
TrafficLayers=[];
if(!Coords||Coords.length<2) return;

var Segments=[];
var CurrentColor=GetTrafficColor(Coords[0]);
var CurrentSegment=[Coords[0]];

for(var I=1;I<Coords.length;I++){
var Color=GetTrafficColor(Coords[I]);
if(Color===CurrentColor){
CurrentSegment.push(Coords[I]);
}else{
CurrentSegment.push(Coords[I]);
Segments.push({coords:CurrentSegment.slice(),color:CurrentColor});
CurrentColor=Color;
CurrentSegment=[Coords[I]];
}
}
if(CurrentSegment.length>1){
Segments.push({coords:CurrentSegment,color:CurrentColor});
}

Segments.forEach(function(Seg){
var Pl=L.polyline(Seg.coords,{color:Seg.color,weight:5,opacity:0.85});
Pl.addTo(Map);
TrafficLayers.push(Pl);
});
}

function GetTrafficColor(Coord){
var Lat=Coord.lat||Coord[0];
var Lng=Coord.lng||Coord[1];

for(var I=0;I<UrbanZones.length;I++){
var Z=UrbanZones[I];
var D=Math.sqrt(Math.pow(Lat-Z.lat,2)+Math.pow(Lng-Z.lng,2));
if(D<Z.radius) return Z.color;
}

if(Lat>=MountainZone.latMin&&Lat<=MountainZone.latMax&&Lng>=MountainZone.lngMin&&Lng<=MountainZone.lngMax){
return '#eab308';
}

return '#22c55e';
}

var WaypointTrafficLayers=[];
function DrawWaypointTrafficOverlay(Coords){
WaypointTrafficLayers.forEach(function(Ly){Map.removeLayer(Ly)});
WaypointTrafficLayers=[];
if(!Coords||Coords.length<2) return;
var WpLatLngs=RouteWaypoints.map(function(W){return L.latLng(W[0],W[1])});
var WpIndices=[0];
for(var W=1;W<WpLatLngs.length;W++){
var BestIdx=0,BestDist=Infinity;
for(var C=WpIndices[WpIndices.length-1];C<Coords.length;C++){
var D=Coords[C].distanceTo(WpLatLngs[W]);
if(D<BestDist){BestDist=D;BestIdx=C}
}
WpIndices.push(BestIdx);
}
var SegColors={};
[2,3,4,5,6].forEach(function(I){SegColors[I]='#ef4444'});
[7,8,9].forEach(function(I){SegColors[I]='#eab308'});
[18,19].forEach(function(I){SegColors[I]='#eab308'});
for(var S=0;S<WpIndices.length-1;S++){
var Start=WpIndices[S];
var End=WpIndices[S+1];
if(Start>=End) continue;
var Color=SegColors[S]||'#22c55e';
var SegCoords=Coords.slice(Start,End+1);
if(SegCoords.length<2) continue;
var Pl=L.polyline(SegCoords,{color:Color,weight:6,opacity:0.8});
Pl.addTo(Map);
WaypointTrafficLayers.push(Pl);
}
}

function GoToStep(N){
if(N<1) N=1;
if(N>Steps.length){
ShiftComplete=true;
CurrentStep=22;
localStorage.setItem('wolfs_step','complete');
BuildMenu();UpdateTopBar();ShowTab(0);ShowPanel();
return;
}
ShiftComplete=false;
CurrentStep=N;
localStorage.setItem('wolfs_step',N);
BuildMenu();UpdateTopBar();ShowTab(0);ShowPanel();
FlyToStep(N);
RefreshMarkers();
if(Steps[N-1].type==='drive') AutoDockForDrive();
}
var goToStep=GoToStep;

function FlyToStep(N){
if(N<1||N>Steps.length) return;
var S=Steps[N-1];
Map.flyTo([S.lat,S.lng],13,{duration:1});
}

function CompleteStep(){
if(ShiftComplete) return;
if(CurrentStep>=22){
ShiftComplete=true;
localStorage.setItem('wolfs_step','complete');
BuildMenu();UpdateTopBar();ShowTab(0);ShowPanel();
RefreshMarkers();
return;
}
var Next=CurrentStep+1;
CurrentStep=Next;
localStorage.setItem('wolfs_step',CurrentStep);
BuildMenu();UpdateTopBar();ShowTab(0);
FlyToStep(CurrentStep);
RefreshMarkers();
if(Steps[CurrentStep-1].type==='drive') AutoDockForDrive();
}
var completeStep=CompleteStep;

function ResetShift(){
ShiftComplete=false;
CurrentStep=1;
localStorage.setItem('wolfs_step','1');
BuildMenu();UpdateTopBar();ShowTab(0);ShowPanel();
FlyToStep(1);
RefreshMarkers();
}

function RefreshMarkers(){
Map.eachLayer(function(Ly){if(Ly._icon) try{Map.removeLayer(Ly)}catch(e){}});
Object.keys(Markers).forEach(function(K){try{Map.removeLayer(Markers[K])}catch(e){}});
Markers={};
var Seen={};
Locations.forEach(function(Loc,I){
var Key=Loc.lat+','+Loc.lng;
if(Seen[Key]&&Key==='35.9132,-81.5387'&&I>0) Key+='_return';
if(Seen[Key]) return;
Seen[Key]=true;
var StepNums=Loc.steps;
var IsCurrent=StepNums.indexOf(CurrentStep)>=0&&!ShiftComplete;
var AllDone=ShiftComplete||StepNums.every(function(S){return S<CurrentStep});
var Color=IsCurrent?'#ff6b35':AllDone?'#22c55e':'#6b7280';
var Cls=IsCurrent?'marker-current':'';
var Num=I+1;
var Icon=L.divIcon({className:'',html:'<div class="'+Cls+'" style="width:34px;height:34px;border-radius:50%;background:'+Color+';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;border:2px solid rgba(255,255,255,.35);cursor:pointer">'+Num+'</div>',iconSize:[34,34],iconAnchor:[17,17]});
var PopupLines='<div style="font-family:sans-serif;font-size:13px;min-width:180px"><strong>'+Loc.name+'</strong>';
StepNums.forEach(function(Sn){var Ss=Steps[Sn-1];var IsDone=Sn<CurrentStep||ShiftComplete;var IsCur=Sn===CurrentStep&&!ShiftComplete;var St=IsDone?'<span style="color:#22c55e">&#10003;</span>':IsCur?'<span style="color:#ff6b35">&#9654;</span>':'<span style="color:#6b7280">&#9675;</span>';PopupLines+='<div style="margin-top:4px">'+St+' <b>'+Ss.time+'</b> '+Ss.name+'</div>'});
PopupLines+='<div style="margin-top:8px"><a href="#" onclick="OpenStepFromMap('+StepNums[0]+');return false" style="color:#ff6b35">View Details</a></div></div>';
var M=L.marker([Loc.lat,Loc.lng],{icon:Icon}).addTo(Map).bindPopup(PopupLines);
M.on('click',function(){ShowPanel();GoToStep(StepNums.indexOf(CurrentStep)>=0?CurrentStep:StepNums[0])});
Loc.steps.forEach(function(Sn){Markers[Sn]=M});
});
}

function OpenStepFromMap(N){
Map.closePopup();
GoToStep(N);
ShowPanel();
}

var CallActive=false;
var MediaStream=null;
var SpeakingNow=false;
var AudioContext=null;
var AudioProcessor=null;

function StartVoiceCall(){
  navigator.mediaDevices.getUserMedia({audio:{sampleRate:16000,channelCount:1,echoCancellation:true,noiseSuppression:true}}).then(function(Stream){
    MediaStream=Stream;
    AudioContext=new (window.AudioContext||window.webkitAudioContext)({sampleRate:16000});
    var Source=AudioContext.createMediaStreamSource(Stream);
    AudioProcessor=AudioContext.createScriptProcessor(4096,1,1);

    AudioProcessor.onaudioprocess=function(E){
      if(!CallActive) return;
      if(SpeakingNow) return;
      var Samples=E.inputBuffer.getChannelData(0);
      var Pcm=new Int16Array(Samples.length);
      for(var I=0;I<Samples.length;I++){
        var S=Math.max(-1,Math.min(1,Samples[I]));
        Pcm[I]=S<0?S*0x8000:S*0x7FFF;
      }
      var Bytes=new Uint8Array(Pcm.buffer);
      var Binary='';
      for(var I=0;I<Bytes.length;I++) Binary+=String.fromCharCode(Bytes[I]);
      var B64=btoa(Binary);
      if(WsConn&&WsConn.readyState===1){
        WsConn.send(JSON.stringify({type:'audio',data:B64}));
      }
    };

    Source.connect(AudioProcessor);
    AudioProcessor.connect(AudioContext.destination);

    if(WsConn&&WsConn.readyState===1){
      WsConn.send(JSON.stringify({type:'call_start',id:'call_'+Date.now()}));
    }

    SetCallState('listening');
    AddChatMsg('system','Voice call connected via Anthropic STT.');
  }).catch(function(Err){
    AddChatMsg('system','Microphone access denied: '+Err.message);
  });
}

function StopVoiceCall(){
  if(AudioProcessor){AudioProcessor.disconnect();AudioProcessor=null}
  if(AudioContext){AudioContext.close();AudioContext=null}
  if(MediaStream){MediaStream.getTracks().forEach(function(T){T.stop()});MediaStream=null}
  if(WsConn&&WsConn.readyState===1){
    WsConn.send(JSON.stringify({type:'call_end'}));
  }
  if(window.speechSynthesis) window.speechSynthesis.cancel();
  SpeakingNow=false;
}

function SetCallState(State){
  var Banner=document.getElementById('callBanner');
  var BannerText=Banner.querySelector('div');
  if(State==='listening'){
    BannerText.innerHTML='&#127911; Listening...';
    BannerText.style.color='#22c55e';
    Banner.style.borderBottom='2px solid rgba(34,197,94,.5)';
    Banner.style.background='#1a3a2a';
  }else if(State==='speaking'){
    BannerText.innerHTML='&#128264; AI Speaking...';
    BannerText.style.color='#ff6b35';
    Banner.style.borderBottom='2px solid rgba(255,107,53,.5)';
    Banner.style.background='#2a1f1a';
  }else if(State==='processing'){
    BannerText.innerHTML='&#9203; Processing...';
    BannerText.style.color='#3b82f6';
    Banner.style.borderBottom='2px solid rgba(59,130,246,.5)';
    Banner.style.background='#1a2332';
  }
}

function SpeakTts(Text){
  if(!window.speechSynthesis||!CallActive) return;
  SpeakingNow=true;
  SetCallState('speaking');
  var Utt=new SpeechSynthesisUtterance(Text);
  Utt.lang='en-US';
  Utt.rate=1.0;
  Utt.pitch=1.0;
  var Voices=speechSynthesis.getVoices();
  for(var I=0;I<Voices.length;I++){
    if(Voices[I].lang.indexOf('en')===0&&Voices[I].name.indexOf('Male')>=0){Utt.voice=Voices[I];break}
  }
  Utt.onend=function(){
    SpeakingNow=false;
    if(CallActive) SetCallState('listening');
  };
  Utt.onerror=function(){
    SpeakingNow=false;
    if(CallActive) SetCallState('listening');
  };
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(Utt);
}

function ToggleCall(){
  if(!ChatOpen) ToggleChat();
  CallActive=!CallActive;
  var Banner=document.getElementById('callBanner');
  var CallBtnMain=document.getElementById('callBtn');
  if(CallActive){
    Banner.style.display='block';
    CallBtnMain.style.background='#ef4444';
    CallBtnMain.innerHTML='&#128222;';
    StartVoiceCall();
  } else { EndCall(); }
}
function EndCall(){
  CallActive=false;
  StopVoiceCall();
  var Banner=document.getElementById('callBanner');
  var CallBtnMain=document.getElementById('callBtn');
  if(Banner) Banner.style.display='none';
  if(CallBtnMain){CallBtnMain.style.background='#22c55e';CallBtnMain.innerHTML='&#128222;';}
  var InterimEl=document.getElementById('interimTranscript');
  if(InterimEl) InterimEl.textContent='';
  AddChatMsg('system','Voice call ended.');
}

ChatOpen=!ChatOpen;
var Panel=document.getElementById('chatPanel');
var Btn=document.getElementById('chatBtn');
if(ChatOpen){
Panel.classList.add('open');
Btn.style.display='none';
document.getElementById('chatInput').focus();
}else{
Panel.classList.remove('open');
Btn.style.display='flex';
}
InvalidateMap();
}
var toggleChat=ToggleChat;

function InitChat(){
var Msgs=document.getElementById('chatMessages');
AddChatMsg('system','Connected to Wolfs Trucking Dispatch');
AddChatMsg('assistant','Good morning Jake. 4 deliveries today, 350 miles. Ready when you are.');
AddChatMsg('user','Starting pre-trip now.');
AddChatMsg('assistant','Copy. Pre-trip logged. Weather clear, 72F. Traffic normal on I-77.');
}

function AddChatMsg(Role,Text,MsgId){
var Msgs=document.getElementById('chatMessages');
var Div=document.createElement('div');
Div.className='chat-msg '+Role;
Div.textContent=Text;
if(MsgId) Div.setAttribute('data-msg-id',MsgId);
Msgs.appendChild(Div);
Msgs.scrollTop=Msgs.scrollHeight;
if(Role==='assistant') TryTts(Text);
}

function SendChat(){
var Input=document.getElementById('chatInput');
var Text=Input.value.trim();
if(!Text) return;
var MsgId='unique_id_'+Date.now();
AddChatMsg('user',Text,MsgId);
Input.value='';
if(WsConn&&WsConn.readyState===WebSocket.OPEN){
WsConn.send(JSON.stringify({type:'chat',content:Text,id:MsgId}));
}else{
setTimeout(function(){
var Responses=[
'Copy that. Updating your dispatch log.',
'Noted. I\'ll flag that for the fleet manager.',
'Roger. ETA adjusted. Stay safe out there.',
'Understood. Routing updated based on your input.',
'Got it. I\'ve logged that in the system.'
];
AddChatMsg('assistant',Responses[Math.floor(Math.random()*Responses.length)],'msg_'+Date.now());
},800+Math.random()*1200);
}
}
var sendChat=SendChat;

function UpdateChatStatus(Connected){
var Dot=document.getElementById('chatDot');
var Status=document.getElementById('chatStatus');
if(Connected){
Dot.className='chat-status-dot connected';
Status.innerHTML='';Status.appendChild(Dot);Status.appendChild(document.createTextNode(' Connected'));
}else{
Dot.className='chat-status-dot disconnected';
Status.innerHTML='';Status.appendChild(Dot);Status.appendChild(document.createTextNode(' Offline'));
}
}

function ConnectWs(){
try{
WsConn=new WebSocket('wss://wolfstruckingco.nbth.workers.dev/ws?role=client');
WsConn.onopen=function(){
UpdateChatStatus(true);
};
WsConn.onmessage=function(E){
try{
var Data=JSON.parse(E.data);
if(Data.type==='transcript'){
var InterimEl=document.getElementById('interimTranscript');
if(InterimEl) InterimEl.textContent=Data.content||'';
return;
}
if(Data.type==='transcript_final'){
AddChatMsg('user',Data.content);
var InterimEl=document.getElementById('interimTranscript');
if(InterimEl) InterimEl.textContent='';
SetCallState('processing');
return;
}
var Content=null;
if(Data.type==='chat'&&Data.content){
Content=Data.content;
AddChatMsg('assistant',Content,Data.id||('msg_'+Date.now()));
}else if(Data.content){
Content=Data.content;
AddChatMsg('assistant',Content,Data.id||('msg_'+Date.now()));
}else if(typeof Data==='string'){
Content=Data;
AddChatMsg('assistant',Content,'msg_'+Date.now());
}
if(Content&&CallActive){SpeakTts(Content)}
}catch(Err){
AddChatMsg('assistant',E.data,'msg_'+Date.now());
if(CallActive){SpeakTts(E.data)}
}
};
WsConn.onclose=function(){
UpdateChatStatus(false);
setTimeout(ConnectWs,5000);
};
WsConn.onerror=function(){
UpdateChatStatus(false);
};
}catch(Err){
UpdateChatStatus(false);
}
}

function TryTts(Text){
if(CallActive) return;
}

document.getElementById('chatInput').addEventListener('keydown',function(E){
if(E.key==='Enter'&&!E.shiftKey){E.preventDefault();SendChat()}
