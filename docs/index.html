.roles a:hover{border-color:#ff6b35;color:#e8e8e8;background:#1a2332}
.badge{color:#ff6b35;font-weight:700;font-size:.7rem;text-transform:uppercase;min-width:48px;text-align:left}
.roles .name{color:#cdd6e0;font-weight:600}
