<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<base href="/wolfstruckingco.com/">
<title>Dispatcher | Wolfs Trucking Co.</title>
<meta name="description" content="Dispatcher — Wolfs Trucking Co. Three-role logistics platform: freight marketplace, real-time tracking, voice navigation, and a dispatcher you can call.">
<meta name="theme-color" content="#ff6b35">
<meta name="color-scheme" content="light">
<link rel="canonical" href="https://cruzlauroiii.github.io/wolfstruckingco.com/Dispatcher">
<link rel="icon" type="image/svg+xml" href="/wolfstruckingco.com/icon.svg">
<link rel="stylesheet" href="/wolfstruckingco.com/css/app.css">
<script>(function(){try{if(!localStorage.getItem("wolfs.theme") && !localStorage.getItem("wolfs_theme")){document.documentElement.setAttribute("data-theme","light");document.documentElement.style.colorScheme="light";}}catch(e){}})();</script></head>
<body data-prerender-route="Dispatcher">

<div id="app">
<div class="TopBar"><div class="Brand"><span class="Logo">W</span>
        <a href class="BrandText">Wolfs · Home</a></div>
    <input type="checkbox" id="MenuToggle" class="MenuToggle" aria-hidden="true" tabindex="-1">
    <label for="MenuToggle" class="BurgerBtn" aria-label="Menu" role="button"><span></span></label>
    <div class="TopActions"><a href="About" class="NavSecondary">About</a>
        <a href="Services" class="NavSecondary">Services</a>
        <a href="Pricing" class="NavSecondary">Pricing</a>
        <a href="Marketplace">Marketplace</a>
        <a href="Apply" class="AccentLink NavTertiary">🚛 Apply to drive</a><a href="Login">Sign In</a><button type="button" class="wt-theme-chip" title="Switch theme">&#x1F317; Auto</button></div></div>
<div class="Stage ChatStage DispatcherStage"><h1>📡 Dispatcher</h1>
    <p class="ChatLede">Live call. Talk to your driver hands-free.</p>
    <div class="ChatStream" id="ChatStream"></div>

<div class="ChatInputRow"><input type="text" name="msg" placeholder="Status update or directive" value="" />
    <button type="button" class="Btn Ghost ChatBtnRound " title="Call driver">&#x1F4DE;</button>
    <label class="Btn Ghost ChatBtnRound" title="Attach photo" for="ChatAttachInput">📎</label><input id="ChatAttachInput" class="HiddenInput" multiple accept="image/*,application/pdf" type="file" />
    <button class="Btn ChatBtnRound Send" type="button" title="Send">&#x27A4;</button></div></div>
</div>

<script src="/wolfstruckingco.com/app/_framework/blazor.webassembly.js" autostart="true"></script>

</body>
</html>
