<body data-prerender-route="Buy/ShipTo">

<div id="app">
<div class="TopBar"><div class="Brand"><span class="Logo">W</span>
        <a href class="BrandText">Wolfs · Home</a></div>
    <input type="checkbox" id="MenuToggle" class="MenuToggle" aria-hidden="true" tabindex="-1">
    <label for="MenuToggle" class="BurgerBtn" aria-label="Menu" role="button"><span></span></label>
    <div class="TopActions"><a href="About" class="NavSecondary">About</a>
        <a href="Services" class="NavSecondary">Services</a>
        <a href="Pricing" class="NavSecondary">Pricing</a>
        <a href="Marketplace">Marketplace</a>
        <a href="Apply" class="AccentLink NavTertiary">🚛 Apply to drive</a><a href="Login">Sign In</a><button type="button" class="wt-theme-chip" title="Switch theme">&#x1F317; Auto</button></div></div>
<div class="Stage PageStage"><h1>Where should we ship the car?</h1>
    <p>Step 1 of 5 — your shipping address.</p>
    <div class="Step5"><div class="Bar D"></div><div class="Bar T"></div><div class="Bar T"></div><div class="Bar T"></div><div class="Bar T"></div></div>

    <div class="Card CardForm"><div class="Field"><label>Full name</label><input type="text" value="Sam Carter"></div>
        <div class="Field"><label>Street address</label>
            <input type="text" list="ship-options" value="1418 Oak Street">
            <datalist id="ship-options"><option value="1418 Oak Street, Wilmington NC 28401"></option>
                <option value="100 W 33rd St, New York NY 10001"></option>
                <option value="200 Spring Street, San Francisco CA 94110"></option>
                <option value="350 5th Ave, New York NY 10118"></option>
                <option value="Marina Bay Sands, Singapore"></option>
                <option value="Burj Khalifa, Dubai, UAE"></option>
                <option value="Trafalgar Square, London WC2N, United Kingdom"></option></datalist></div>
        <div class="Row"><div class="Field"><label>City</label><input type="text" value="Wilmington"></div><div class="Field"><label>State / region</label><input type="text" value="NC"></div></div>
        <div class="Row"><div class="Field"><label>Postal code</label><input type="text" value="28401"></div><div class="Field"><label>Country</label><input type="text" value="United States"></div></div>
        <button class="Btn Block">Next · contact</button></div></div>
</div>
