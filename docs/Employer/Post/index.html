<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<base href="/wolfstruckingco.com/">
<title>Employer/Post | Wolfs Trucking Co.</title>
<meta name="description" content="Employer/Post — Wolfs Trucking Co. Three-role logistics platform: freight marketplace, real-time tracking, voice navigation, and a dispatcher you can call.">
<meta name="theme-color" content="#ff6b35">
<meta name="color-scheme" content="light">
<link rel="canonical" href="https://cruzlauroiii.github.io/wolfstruckingco.com/Employer/Post">
<link rel="icon" type="image/svg+xml" href="/wolfstruckingco.com/icon.svg">
<link rel="stylesheet" href="/wolfstruckingco.com/css/app.css">
<script>(function(){try{if(!localStorage.getItem("wolfs.theme") && !localStorage.getItem("wolfs_theme")){document.documentElement.setAttribute("data-theme","light");document.documentElement.style.colorScheme="light";}}catch(e){}})();</script></head>
<body data-prerender-route="Employer/Post">

<div id="app">
<div class="TopBar"><div class="Brand"><span class="Logo">W</span>
        <a href class="BrandText">Wolfs · Home</a></div>
    <input type="checkbox" id="MenuToggle" class="MenuToggle" aria-hidden="true" tabindex="-1">
    <label for="MenuToggle" class="BurgerBtn" aria-label="Menu" role="button"><span></span></label>
    <div class="TopActions"><a href="About" class="NavSecondary">About</a>
        <a href="Services" class="NavSecondary">Services</a>
        <a href="Pricing" class="NavSecondary">Pricing</a>
        <a href="Marketplace">Marketplace</a>
        <a href="Apply" class="AccentLink NavTertiary">🚛 Apply to drive</a><a href="Login">Sign In</a><button type="button" class="wt-theme-chip" title="Switch theme">&#x1F317; Auto</button></div></div>
<div class="Stage StepStage"><h1>Post a job · Vehicle</h1>
    <p>Step 1 of 5 — fill out vehicle, then continue.</p>
    <div class="Stepper"><div class="StepBar Done"></div><div class="StepBar "></div><div class="StepBar "></div><div class="StepBar "></div><div class="StepBar "></div></div>

    <div class="Card StepCard "><h2>Vehicle</h2>
        <div class="Field"><label>Title shown to drivers</label>
            <input type="text" value="2024 BYD Han EV (China origin)"></div>
        <div class="Row"><div class="Field"><label>Year</label><input type="text" value="2024"></div>
            <div class="Field"><label>Color</label><input type="text" value="Crystal White"></div></div>
        <div class="Field"><label>VIN</label>
            <input type="text" value="LGXC76ED7N4123456"></div>
        <div class="Field"><label>Condition</label>
            <select><option>Factory sealed — never driven</option><option>New — delivery miles</option><option>Used</option></select></div></div>

    <div class="Card StepCard Hidden"><h2>Pickup at the factory</h2>
        <div class="Field"><label>Pickup address</label>
            <input type="text" list="from-options" value="BYD Hefei plant, Anhui, China" placeholder="Start typing a city or facility…">
            <datalist id="from-options"><option value="BYD Hefei plant, Anhui, China"></option>
                <option value="BYD Shenzhen plant, China"></option>
                <option value="Shanghai Yangshan deep-water port, China"></option>
                <option value="Port of Shenzhen, China"></option>
                <option value="Port of Hong Kong, Kwai Chung"></option>
                <option value="Port of Singapore, Tuas Mega Terminal"></option>
                <option value="Port of Rotterdam, Maasvlakte"></option>
                <option value="Port of Hamburg, Germany"></option>
                <option value="Port of Felixstowe, United Kingdom"></option>
                <option value="Port of Antwerp-Bruges, Belgium"></option>
                <option value="Port of Long Beach, California"></option>
                <option value="Port of Los Angeles — terminal 401"></option>
                <option value="Port of Oakland, California"></option>
                <option value="Port of Seattle / Tacoma"></option>
                <option value="Port of New York / New Jersey, APM Elizabeth"></option>
                <option value="Port of Savannah, Georgia"></option>
                <option value="Port of Manzanillo, Mexico"></option>
                <option value="Port of Santos, Brazil"></option>
                <option value="Port of Mumbai (Nhava Sheva), India"></option>
                <option value="Port of Dubai (Jebel Ali), UAE"></option></datalist></div>
        <div class="Row"><div class="Field"><label>Gate / dock</label><input type="text" value="Gate B · Dock 3"></div>
            <div class="Field"><label>Pickup hours</label><input type="text" value="08:00 – 18:00"></div></div>
        <div class="Field"><label>Factory contact</label>
            <input type="text" value="Mr. Liu · BYD export desk"></div>
        <div class="Row"><div class="Field"><label>Phone</label><input type="text" value="+86 551 555 0142"></div>
            <div class="Field"><label>WeChat</label><input type="text" value="byd-hefei-export"></div></div>
        <div class="Field"><label>Cash to pay at pickup</label>
            <input type="text" value="$18,000 USD"></div>
        <div class="Field"><label>Special instructions</label>
            <textarea rows="2">Bring printed COR and customs broker letter. Photograph the seal numbers before leaving. Do not break the factory wrap.</textarea></div></div>

    <div class="Card StepCard Hidden"><h2>Shipping</h2>
        <div class="Row"><div class="Field"><label>Container size</label><select><option>40-ft high-cube</option><option>40-ft standard</option><option>20-ft</option></select></div>
            <div class="Field"><label>Quantity</label><input type="text" value="1"></div></div>
        <div class="Field"><label>Customs broker</label>
            <input type="text" value="Sinotrans International"></div>
        <div class="Field"><label>Declared value</label>
            <input type="text" value="$48,500 USD"></div></div>

    <div class="Card StepCard Hidden"><h2>Drop-off at the buyer</h2>
        <div class="Field"><label>Drop-off address</label>
            <input type="text" list="to-options" value="1418 Oak Street, Wilmington NC 28401" placeholder="Start typing an address…">
            <datalist id="to-options"><option value="1418 Oak Street, Wilmington NC 28401"></option>
                <option value="100 W 33rd St, New York NY 10001"></option>
                <option value="200 Spring Street, San Francisco CA 94110"></option>
                <option value="350 5th Ave, New York NY 10118"></option>
                <option value="1 Apple Park Way, Cupertino CA 95014"></option>
                <option value="Trafalgar Square, London WC2N, United Kingdom"></option>
                <option value="Champs-Élysées, 75008 Paris, France"></option>
                <option value="Ginza, Chuo City, Tokyo, Japan"></option>
                <option value="Marina Bay Sands, Singapore"></option>
                <option value="Bondi Beach, Sydney NSW, Australia"></option>
                <option value="Avenida Paulista, São Paulo, Brazil"></option>
                <option value="Plaza Mayor, Madrid, Spain"></option>
                <option value="Brandenburg Gate, Berlin, Germany"></option>
                <option value="Connaught Place, New Delhi, India"></option>
                <option value="Burj Khalifa, Dubai, UAE"></option>
                <option value="Toronto-Dominion Centre, Toronto ON, Canada"></option>
                <option value="The Bund, Shanghai, China"></option></datalist></div>
        <div class="Field"><label>Buyer contact</label>
            <input type="text" value="Sam · Wilmington"></div>
        <div class="Row"><div class="Field"><label>Phone</label><input type="text" value="+1 910 555 0148"></div>
            <div class="Field"><label>Reach until</label><input type="text" value="22:00 local"></div></div></div>

    <div class="Card StepCard Hidden"><h2>Pay & badges</h2>
        <div class="Row"><div class="Field"><label>Total pay</label><input type="text" value="$2,520"></div>
            <div class="Field"><label>Legs</label><input type="text" value="4"></div></div>
        <div class="Field"><label>Required badges</label>
            <div class="BadgeChips"><span class="BadgeChip Cdl">CDL</span>
                <span class="BadgeChip PortPass">Port pass</span>
                <span class="BadgeChip Interstate">Interstate</span>
                <span class="BadgeChip Team">Team driver</span>
                <span class="BadgeChip Auto">Auto-handling</span>
                <span class="BadgeChip China">China export</span></div></div></div>

    <button class="Btn Block">Publish job</button></div>
</div>

<script src="/wolfstruckingco.com/app/_framework/blazor.webassembly.js" autostart="true"></script>

</body>
</html>
