<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign In | Wolfs Trucking Co.</title>
<link rel="icon" type="image/svg+xml" href="/wolfstruckingco.com/icon.svg">
<link rel="apple-touch-icon" href="/wolfstruckingco.com/icon.svg">
<link rel="manifest" href="/wolfstruckingco.com/manifest.json">
<meta name="theme-color" content="#ff6b35">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1419;--card:#1a2332;--accent:#ff6b35;--accent-hover:#ff8c5a;--text:#e8e8e8;--text-muted:#8899aa;--border:#2a3a4a;--success:#22c55e;--info:#3b82f6;--warning:#f59e0b;--radius:12px}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}

.LoginWrap{width:100%;max-width:520px}
.CredForm{display:grid;gap:10px;margin-bottom:8px}
.CredForm input{padding:12px 14px;border-radius:10px;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:.95rem}
.CredForm input:focus{border-color:var(--accent);outline:none}
.CredForm button{padding:12px 18px;border-radius:10px;background:var(--accent);color:#fff;border:none;font-weight:700;cursor:pointer;font-size:.95rem;font-family:inherit}
.CredForm button:hover{background:var(--accent-hover)}
.CredHint{font-size:.78rem;color:var(--text-muted);text-align:center;margin-bottom:16px}
.CredHint a{color:var(--accent);text-decoration:none;font-weight:700}
.LoginCard{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px 36px;text-align:center}
.Logo{width:56px;height:56px;border-radius:14px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:1.6rem;color:#fff;margin:0 auto 20px}
.LoginCard h1{font-size:1.35rem;font-weight:800;margin-bottom:6px}
.LoginCard>p{color:var(--text-muted);font-size:.85rem;margin-bottom:24px}

.SsoButtons{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.SsoBtn{display:flex;align-items:center;justify-content:center;gap:10px;padding:12px 16px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:.88rem;font-weight:600;cursor:pointer;text-decoration:none;min-height:48px;transition:all .2s;font-family:inherit}
.SsoBtn:hover{border-color:var(--accent);background:rgba(255,107,53,.05);color:var(--text)}
.SsoBtn svg{width:20px;height:20px;flex-shrink:0}

.Divider{display:flex;align-items:center;gap:16px;margin:24px 0;color:var(--text-muted);font-size:.78rem}
.Divider::before,.Divider::after{content:'';flex:1;height:1px;background:var(--border)}

.LoginFooter{margin-top:20px;font-size:.82rem;color:var(--text-muted)}
.LoginFooter a{color:var(--accent)}
.LoginFooter a:hover{color:var(--accent-hover)}
.BackLink{display:inline-flex;align-items:center;gap:8px;color:var(--text-muted);font-size:.82rem;margin-top:16px;text-decoration:none;min-height:44px;justify-content:center}
.BackLink:hover{color:var(--accent)}
.ErrMsg{background:rgba(239,68,68,.1);border:1px solid #ef4444;color:#ef4444;padding:10px 14px;border-radius:8px;font-size:.82rem;margin-bottom:12px;display:none}
</style>
</head>
<body>
<div class="LoginWrap">
<div class="LoginCard">
  <div class="Logo">W</div>
  <h1>Sign in to your account</h1>
  <p>Access your dashboard, dispatch system, and earnings.</p>

  <div class="ErrMsg" id="ErrMsg"></div>

  <form class="CredForm" id="CredForm" autocomplete="off">
    <input name="username" placeholder="Username" required autocomplete="username">
    <input name="password" type="password" placeholder="Password" required autocomplete="current-password">
    <button type="submit">Sign in</button>
  </form>
  <div class="CredHint">New here? <a href="/wolfstruckingco.com/SignUp/">Create an account</a></div>

  <div class="Divider">or use single sign-on</div>

  <div class="SsoButtons">
    <a class="SsoBtn" href="https://prtask.com/Api/Auth/Google?redirect=https://cruzlauroiii.github.io/wolfstruckingco.com/Login/">
      <svg viewBox="0 0 24 24"><path fill="#4285f4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34a853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#fbbc05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#ea4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Google
    </a>
    <a class="SsoBtn" href="https://prtask.com/Api/Auth/GitHub?redirect=https://cruzlauroiii.github.io/wolfstruckingco.com/Login/">
      <svg viewBox="0 0 24 24" fill="#f0f6fc"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
      GitHub
    </a>
    <a class="SsoBtn" href="https://prtask.com/Api/Auth/Azure?redirect=https://cruzlauroiii.github.io/wolfstruckingco.com/Login/">
      <svg viewBox="0 0 24 24"><rect x="1" y="1" width="10" height="10" fill="#f25022"/><rect x="13" y="1" width="10" height="10" fill="#7fba00"/><rect x="1" y="13" width="10" height="10" fill="#00a4ef"/><rect x="13" y="13" width="10" height="10" fill="#ffb900"/></svg>

      Okta
    </a>
  </div>

  <div class="LoginFooter">
    <p>By signing in, you agree to our Terms of Service and Privacy Policy.</p>
  </div>
  <a class="BackLink" href="/wolfstruckingco.com/">&#8592; Back to homepage</a>
</div>
</div>

<script src="/wolfstruckingco.com/db.js"></script>
<script>
var ROLE_DEST = {
  applicant: '/wolfstruckingco.com/Applicant/',
  admin:     '/wolfstruckingco.com/HiringHall/',
  staff:     '/wolfstruckingco.com/HiringHall/',
  client:    '/wolfstruckingco.com/Employer/Post/',
  employer:  '/wolfstruckingco.com/Employer/Post/',
  driver:    '/wolfstruckingco.com/Dashboard/',
  investor:  '/wolfstruckingco.com/Investors/KPI/',
};

function showError(msg) {
  var e = document.getElementById('ErrMsg');
  e.textContent = msg;
  e.style.display = 'block';
}

async function hashPw(pw) {
  var buf = new TextEncoder().encode(pw + ':wolfs-salt');
  var h = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(h)).map(b => b.toString(16).padStart(2,'0')).join('');
}

document.getElementById('CredForm').addEventListener('submit', async function(ev){
  ev.preventDefault();
  document.getElementById('ErrMsg').style.display = 'none';
  var fd = new FormData(ev.target);
  var u = (fd.get('username') || '').toLowerCase().trim();
  var p = (fd.get('password') || '').trim();
  if (!u || !p) return;
  try {
    var users = await WolfsDB.all('users');
    var hash = await hashPw(p);
    var acct = users.find(function(x){ return (x.username||'').toLowerCase() === u; });
    if (!acct) { showError('No account found for "' + u + '". Create one via Create an account.'); return; }
    if (acct.passwordHash !== hash) { showError('Wrong password.'); return; }
    var role = (acct.role || 'driver').toLowerCase();
    var email = acct.email || (u + '@wolfstruckingco.com');
    // Prefer the linked worker's display name if this account is a hired driver — avoids the
    // dispatcher greeting "Hi Driver" when the worker record already knows the real name.
    var displayName = acct.name;
    try {
      if (role === 'driver') {
        var workers = await WolfsDB.all('workers');
        var w = workers.find(function(x){ return (x.email||'').toLowerCase() === email.toLowerCase(); });
        if (w && w.name) displayName = w.name;
      }
    } catch (_) {}
    localStorage.setItem('wolfs_session', 'cred_' + u + '_' + Date.now());
    localStorage.setItem('wolfs_email', email);
    localStorage.setItem('wolfs_role', role);
    localStorage.setItem('wolfs_name', displayName || (u.charAt(0).toUpperCase() + u.slice(1)));
    localStorage.removeItem('wolfs_demo');
    window.location.href = ROLE_DEST[role] || '/wolfstruckingco.com/Dashboard/';
  } catch (ex) {
    showError('Sign-in failed: ' + (ex.message || ex));
  }
});

// SSO post-redirect handler
var ADMIN_EMAILS = ['keichee@gmail.com', 'cruzlauroiii@gmail.com'];
async function InferRole(email) {
  var e = (email || '').toLowerCase();
  if (ADMIN_EMAILS.includes(e)) return 'admin';
  try {
    var customers = await WolfsDB.all('customers');
    for (var c of customers) {
      for (var u of (c.users || [])) {
        if ((u.email || '').toLowerCase() === e) return 'client';
      }
    }
    var workers = await WolfsDB.all('workers');
    if (workers.find(function(w){ return (w.email||'').toLowerCase() === e; })) return 'driver';
  } catch(_) {}
  return 'client';
}

(async function() {
  var Params = new URLSearchParams(window.location.search);
  var Token = Params.get('session') || Params.get('token');
  var Email = Params.get('email');
  var Role = Params.get('role');
  if (Token && Email) {
    if (!Role) Role = await InferRole(Email);
    localStorage.setItem('wolfs_session', Token);
    localStorage.setItem('wolfs_email', Email);
    localStorage.setItem('wolfs_role', Role);
    localStorage.removeItem('wolfs_demo');
    window.location.href = ROLE_DEST[Role] || '/wolfstruckingco.com/Dashboard/';
    return;
  }
  var Session = localStorage.getItem('wolfs_session');
  if (Session && !localStorage.getItem('wolfs_demo')) {
    var StoredRole = localStorage.getItem('wolfs_role');
    window.location.href = ROLE_DEST[StoredRole] || '/wolfstruckingco.com/Dashboard/';
  }
})();
</script>
</body>
</html>
